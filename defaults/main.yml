---
# Project source code URL: https://framagit.org/kaihuri/mobilizon/

mobilizon_enabled: true

mobilizon_identifier: mobilizon
mobilizon_base_path: "/{{ mobilizon_identifier }}"
mobilizon_data_path: "{{ mobilizon_base_path }}/data"
mobilizon_uploads_path: "{{ mobilizon_data_path }}/uploads"
mobilizon_tzdata_path: "{{ mobilizon_data_path }}/tzdata"
mobilizon_config_path: "{{ mobilizon_base_path }}/config"

# renovate: datasource=docker depName=kaihuri/mobilizon
mobilizon_version: 5.2.3

mobilizon_uid: ""
mobilizon_gid: ""

# The scheme used for serving Mobilizon.
mobilizon_scheme: https

# The hostname at which Mobilizon is served. DO NOT CHANGE after first run or it'll break federation
mobilizon_hostname: ""

# The path at which Mobilizon is served.
# This value must either be `/` or not end with a slash (e.g. `/mobilizon`).
mobilizon_path_prefix: /

mobilizon_container_image: "{{ mobilizon_container_image_registry_prefix }}{{ mobilizon_container_image_name }}"
mobilizon_container_image_name: "kaihuri/mobilizon:{{ mobilizon_container_image_tag }}"
mobilizon_container_image_registry_prefix: docker.io/
mobilizon_container_image_tag: "{{ mobilizon_version }}"
mobilizon_container_image_force_pull: "{{ mobilizon_container_image.endswith(':latest') }}"

mobilizon_container_image_self_build: false
mobilizon_container_repo: "https://framagit.org/kaihuri/mobilizon.git"
mobilizon_container_repo_version: "{{ mobilizon_version if mobilizon_version != 'latest' else 'main' }}"
mobilizon_container_src_files_path: "{{ mobilizon_base_path }}/docker-src"

# The base container network. It will be auto-created by this role if it doesn't exist already.
mobilizon_container_network: "{{ mobilizon_identifier }}"

# Control if the container network is deleted on uninstalling.
mobilizon_container_network_deletion_enabled: true

# Specify how the container publishes its HTTP port (as defined by `mobilizon_container_http_port`).
#
# Takes an "<ip>:<port>" or "<port>" value (e.g. "127.0.0.1:2586"), or empty string to not expose.
mobilizon_container_http_host_bind_port: ""

# Port that the container will use for the web interface
mobilizon_container_http_port: 4000

# A list of additional container networks that the container would be connected to.
# The role does not create these networks, so make sure they already exist.
# Use this to expose this container to another reverse proxy, which runs in a different container network.
mobilizon_container_additional_networks: "{{ mobilizon_container_additional_networks_auto + mobilizon_container_additional_networks_custom }}"
mobilizon_container_additional_networks_auto: []
mobilizon_container_additional_networks_custom: []

# A list of additional "volumes" to mount in the container.
# This list gets populated dynamically at runtime. You can provide a different default value,
# if you wish to mount your own files into the container.
# Contains definition objects like this: `{"type": "bind", "src": "/outside", "dst": "/inside", "options": "readonly"}.
# See the `--mount` documentation for the `docker run` command.
mobilizon_container_additional_volumes: "{{ mobilizon_container_additional_volumes_auto + mobilizon_container_additional_volumes_custom }}"
mobilizon_container_additional_volumes_auto: []
mobilizon_container_additional_volumes_custom: []

# mobilizon_container_labels_traefik_enabled controls whether labels to assist a Traefik reverse-proxy will be attached to the container.
# See `../templates/labels.j2` for details.
#
# To inject your own other container labels, see `mobilizon_container_labels_additional_labels_custom`.
mobilizon_container_labels_traefik_enabled: true
mobilizon_container_labels_traefik_docker_network: "{{ mobilizon_container_network }}"
mobilizon_container_labels_traefik_hostname: "{{ mobilizon_hostname }}"
# The path prefix must either be `/` or not end with a slash (e.g. `/mobilizon`).
mobilizon_container_labels_traefik_path_prefix: "{{ mobilizon_path_prefix }}"
mobilizon_container_labels_traefik_rule: "Host(`{{ mobilizon_container_labels_traefik_hostname }}`){% if mobilizon_container_labels_traefik_path_prefix != '/' %} && PathPrefix(`{{ mobilizon_container_labels_traefik_path_prefix }}`){% endif %}"
mobilizon_container_labels_traefik_priority: 0
mobilizon_container_labels_traefik_entrypoints: web-secure
mobilizon_container_labels_traefik_tls: "{{ mobilizon_container_labels_traefik_entrypoints != 'web' }}"
mobilizon_container_labels_traefik_tls_certResolver: default  # noqa var-naming

# Controls which additional headers to attach to all HTTP requests.
# To add your own custom request headers, use `mobilizon_container_labels_traefik_additional_request_headers_custom`
mobilizon_container_labels_traefik_additional_request_headers: "{{ mobilizon_container_labels_traefik_additional_request_headers_auto | combine(mobilizon_container_labels_traefik_additional_request_headers_custom) }}"
mobilizon_container_labels_traefik_additional_request_headers_auto: {}
mobilizon_container_labels_traefik_additional_request_headers_custom: {}

# Controls which additional headers to attach to all HTTP responses.
# To add your own custom response headers, use `mobilizon_container_labels_traefik_additional_response_headers_custom`
mobilizon_container_labels_traefik_additional_response_headers: "{{ mobilizon_container_labels_traefik_additional_response_headers_auto | combine(mobilizon_container_labels_traefik_additional_response_headers_custom) }}"
mobilizon_container_labels_traefik_additional_response_headers_auto: |
  {{
    {}
    | combine ({'X-XSS-Protection': mobilizon_http_header_xss_protection} if mobilizon_http_header_xss_protection else {})
    | combine ({'X-Content-Type-Options': mobilizon_http_header_content_type_options} if mobilizon_http_header_content_type_options else {})
    | combine ({'Content-Security-Policy': mobilizon_http_header_content_security_policy} if mobilizon_http_header_content_security_policy else {})
    | combine ({'Permissions-Policy': mobilizon_http_header_permissions_policy} if mobilizon_http_header_permissions_policy else {})
    | combine ({'Strict-Transport-Security': mobilizon_http_header_strict_transport_security} if mobilizon_http_header_strict_transport_security and mobilizon_container_labels_traefik_tls else {})
  }}
mobilizon_container_labels_traefik_additional_response_headers_custom: {}

# mobilizon_container_labels_additional_labels contains a multiline string with additional labels to add to the container label file.
# See `../templates/labels.j2` for details.
# To add your own custom labels, use `mobilizon_container_labels_additional_labels_custom`
#
# Example:
# mobilizon_container_labels_additional_labels_custom:
#   - my.label=1
#   - another.label="here"
mobilizon_container_labels_additional_labels: "{{ mobilizon_container_labels_additional_labels_auto + mobilizon_container_labels_additional_labels_custom }}"
mobilizon_container_labels_additional_labels_auto: []
mobilizon_container_labels_additional_labels_custom: []

# Specifies how often the container health-check will run.
#
# For Traefik based setups, it's important that the interval is short,
# because the interval value also specifies the "initial wait time".
# This is a Docker (moby) bug: https://github.com/moby/moby/issues/33410
# Without a successful healthcheck, Traefik will not register the service for reverse-proxying.
# Thus, the health interval determines the initial start-up time -- the smaller, the better.
#
# For non-Traefik setups, we use the default healthcheck interval (60s) to decrease overhead.
mobilizon_container_health_interval: "{{ '5s' if mobilizon_container_labels_traefik_enabled else '60s' }}"

# Intentionally leaving this blank, instead of defaulting it to `mobilizon_hostname`, to avoid specifying a hostname
# which could render other services on that hostname potentially unreachable.
# See: https://github.com/mother-of-all-self-hosting/mash-playbook/issues/391
mobilizon_container_hostname: ""

# Specify the size of the container's tmpfs volume
mobilizon_container_tmpfs_tmp_size: 128m

# A list of extra arguments to pass to the container (`docker create` command)
mobilizon_container_extra_arguments: "{{ mobilizon_container_extra_arguments_auto + mobilizon_container_extra_arguments_custom }}"
mobilizon_container_extra_arguments_auto: []
mobilizon_container_extra_arguments_custom: []

# Specifies the value of the `X-XSS-Protection` header
# Stops pages from loading when they detect reflected cross-site scripting (XSS) attacks.
#
# Learn more about it is here:
# - https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/X-XSS-Protection
# - https://portswigger.net/web-security/cross-site-scripting/reflected
mobilizon_http_header_xss_protection: "1; mode=block"

# Specifies the value of the `X-Content-Type-Options` header.
# See: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/X-Content-Type-Options
mobilizon_http_header_content_type_options: nosniff

# Specifies the value of the `Content-Security-Policy` header.
# See: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Content-Security-Policy
mobilizon_http_header_content_security_policy: frame-ancestors 'self'

# Specifies the value of the `Permissions-Policy` header.
# See: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Permissions-Policy
mobilizon_http_header_permissions_policy: "{{ 'interest-cohort=()' if mobilizon_floc_optout_enabled else '' }}"

# Specifies the value of the `Strict-Transport-Security` header.
# See: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Strict-Transport-Security
mobilizon_http_header_strict_transport_security: "max-age=31536000; includeSubDomains{{ '; preload' if mobilizon_hsts_preload_enabled else '' }}"

# Controls whether to send a "Permissions-Policy interest-cohort=();" header along with all responses
#
# Learn more about what it is here:
# - https://www.eff.org/deeplinks/2021/03/googles-floc-terrible-idea
# - https://paramdeo.com/blog/opting-your-website-out-of-googles-floc-network
# - https://amifloced.org/
#
# Of course, a better solution is to just stop using browsers (like Chrome), which participate in such tracking practices.
# See: `mobilizon_http_header_permissions_policy`
mobilizon_floc_optout_enabled: true

# Controls if HSTS preloading is enabled
#
# In its strongest and recommended form, the [HSTS policy](https://www.chromium.org/hsts) includes all subdomains, and
# indicates a willingness to be "preloaded" into browsers:
# `Strict-Transport-Security: max-age=31536000; includeSubDomains; preload`
# For more information visit:
# - https://en.wikipedia.org/wiki/HTTP_Strict_Transport_Security
# - https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Strict-Transport-Security
# - https://hstspreload.org/#opt-in
# See: `mobilizon_http_header_strict_transport_security`
mobilizon_hsts_preload_enabled: false

# List of systemd services that the Mobilizon systemd service depends on
mobilizon_systemd_required_services_list: "{{ mobilizon_systemd_required_services_list_default + mobilizon_systemd_required_services_list_auto + mobilizon_systemd_required_services_list_custom }}"
mobilizon_systemd_required_services_list_default: "{{ [devture_systemd_docker_base_docker_service_name] if devture_systemd_docker_base_docker_service_name else [] }}"
mobilizon_systemd_required_services_list_auto: []
mobilizon_systemd_required_services_list_custom: []

# List of systemd services that the Mobilizon systemd service wants
mobilizon_systemd_wanted_services_list: "{{ mobilizon_systemd_wanted_services_list_default + mobilizon_systemd_wanted_services_list_auto + mobilizon_systemd_wanted_services_list_custom }}"
mobilizon_systemd_wanted_services_list_default: []
mobilizon_systemd_wanted_services_list_auto: []
mobilizon_systemd_wanted_services_list_custom: []

# Controls how long to wait for the container to stop gracefully before killing it.
mobilizon_container_stop_grace_time_seconds: "{{ devture_systemd_docker_base_container_stop_grace_time_seconds }}"

# Controls how long the pre-start cleanup should wait for stale container-name release
# before failing startup explicitly.
mobilizon_container_cleanup_timeout_seconds: "{{ devture_systemd_docker_base_container_cleanup_timeout_seconds }}"

# Controls the delay between pre-start cleanup retries.
mobilizon_container_cleanup_retry_delay_seconds: "{{ devture_systemd_docker_base_container_cleanup_retry_delay_seconds }}"

# Shell command used in the systemd pre-start phase to deterministically remove a stale
# container and wait until Docker releases its name.
mobilizon_container_cleanup_command: |
  i=0;
  while [ "$i" -lt {{ mobilizon_container_cleanup_timeout_seconds }} ]; do
  {{ devture_systemd_docker_base_host_command_docker }} stop -t {{ mobilizon_container_stop_grace_time_seconds }} {{ mobilizon_identifier }} >/dev/null 2>&1 || true;
  {{ devture_systemd_docker_base_host_command_docker }} rm -f {{ mobilizon_identifier }} >/dev/null 2>&1 || true;
  if {{ devture_systemd_docker_base_host_command_docker }} container inspect {{ mobilizon_identifier }} >/dev/null 2>&1; then
  i=$((i + 1));
  sleep {{ mobilizon_container_cleanup_retry_delay_seconds }};
  continue;
  fi;
  if {{ devture_systemd_docker_base_host_command_docker }} info >/dev/null 2>&1; then
  exit 0;
  fi;
  echo "Failed to query Docker daemon while cleaning up {{ mobilizon_identifier }}" >&2;
  exit 1;
  done;
  echo "Failed to remove stale container {{ mobilizon_identifier }} after {{ mobilizon_container_cleanup_timeout_seconds }} attempts" >&2;
  exit 1

# mobilizon_users contains a list of users that should be created automatically
# To add your own users for specific host, use `mobilizon_users_custom`
#
# Example:
# mobilizon_users_custom:
#   - email: admin@example.com
#     initial_password: password
#     role: admin
#   - email: admin@example.com
#     initial_password: password
#     role: user
mobilizon_users: "{{ mobilizon_users_auto + mobilizon_users_custom }}"
mobilizon_users_auto: []
mobilizon_users_custom: []

# Specify the timezone
mobilizon_environment_variables_tz: UTC

# Specify the name for your instance
mobilizon_environment_variables_instance_name: ""

# Control if registration is opened or closed
mobilizon_environment_variables_registrations_open: false

# Specify sender email address
mobilizon_environment_variables_instance_email: ""

# Specify receiver email address
mobilizon_environment_variables_email_reply_email: ""

# Specify log level
mobilizon_environment_variables_loglevel: error

# Specify database configuration
mobilizon_database_hostname: ""
mobilizon_database_port: 5432
mobilizon_database_username: mobilizon
mobilizon_database_password: ""
mobilizon_database_sslmode: false
mobilizon_database_name: mobilizon

# Specify a secret key used as a base to generate secrets for encrypting and signing data
# generated with `pwgen -s 64 1` or in another way.
mobilizon_environment_variables_secret_key_base: ""

# Specify a secret key used as a base to generate JWT tokens
# generated with `pwgen -s 64 1` or in another way.
mobilizon_environment_variables_secret_key: ""

# Specify mailer configuration
mobilizon_environment_variables_email_smtp_server: ""
mobilizon_environment_variables_email_smtp_port: 465
mobilizon_environment_variables_email_smtp_username: ""
mobilizon_environment_variables_email_smtp_password: ""
mobilizon_environment_variables_email_smtp_ssl: true
mobilizon_environment_variables_email_smtp_tls: if_available

# Additional environment variables.
mobilizon_environment_variables_additional_variables: ""
